# Template only. Do NOT commit a real connection string.
# The real Secret is created by deploy/scripts/deploy.sh from the Terraform
# output `db_connection_string`. To create it manually instead:
#
#   kubectl create secret generic socialstocks-db \
#     --namespace social-stocks \
#     --from-literal=connection-string='Host=...;Port=5432;Database=socialstocks;Username=postgres;Password=...'
#
apiVersion: v1
kind: Secret
metadata:
  name: socialstocks-db
  namespace: social-stocks
type: Opaque
stringData:
  connection-string: "Host=REPLACE;Port=5432;Database=socialstocks;Username=postgres;Password=REPLACE"
