apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: social-stocks
  labels:
    app: api
  annotations:
    # Provision an internet-facing NLB via the in-tree AWS cloud controller
    # (built into EKS) so no extra AWS Load Balancer Controller install is
    # needed. Cheaper/simpler than an ALB ingress for a single-service POC.
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app: api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
